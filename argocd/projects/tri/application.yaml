apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: JustTri
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/trahulprabhu38/JustTri.git
    targetRevision: main
    path: k8s/
  destination:
    server: https://kubernetes.default.svc
    namespace: tri
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true
    syncOptions:
      - createNamespace=true 